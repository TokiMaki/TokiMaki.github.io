services:
  - type: web
    name: dnf-hell-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 neople_hell_api_server.py --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NEOPLE_API_KEY
        sync: false
